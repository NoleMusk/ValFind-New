<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ValFind Search Engine</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="header-right">
        <a href="under-development.html">Vmail</a>
        <a href="under-development.html">Gambar</a>
        <a href="under-development.html">
          <span class="material-icons">apps</span>
        </a>
        <a href="login.html"><button class="login-btn">Login</button></a>
      </div>
    </header>
    <main>
      <div class="feature">
        <img src="src/image_3c14e591.png" />
        <div class="search">
          <div class="search-input">
            <span class="material-icons cari">search</span>
            <input
              id="search"
              type="text"
              placeholder="Search Seattle"
              autocomplete="off"
            />
            <span class="material-icons photo">photo_camera</span>
          </div>
          <div class="search-suggestion">
            <ul id="suggestions"></ul>
            <div id="results"></div>
          </div>
          <div class="search-action">
            <button data-i18n="button1">Hai antek-antek asing</button>
            <button data-i18n="button2">Saya lagi beruntung</button>
          </div>
          <div class="language">
            <div>
              <span data-i18n="availableIn">Tersedia dalam bahasa:</span>
              <a href="#" data-lang="en" data-i18n="english">English</a>
              <a href="#" data-lang="id" data-i18n="indonesia">Indonesia</a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
    <script src="./src/js/lang.js"></script>
  </body>
</html>
